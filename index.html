  <!-- PAGE: GALLERY -->

    <h2 class="section-title">سویتا خانوم ❤️</h2>
    <div id="galleryGrid" class="gallery-grid"></div>
  </main>

  <!-- PAGE: ABOUT -->
  <section id="page-about" class="page about-page">
    <div class="heart-container">
      <div class="heart-svg-wrap">
        <!-- Heart glow behind -->
        <svg class="heart-bg" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
          <path d="M150 240 C150 240 20 160 20 90 C20 50 50 20 90 20 C110 20 130 32 150 48 C170 32 190 20 210 20 C250 20 280 50 280 90 C280 160 150 240 150 240Z" fill="#ff85a2"/>
        </svg>
        <!-- Glass heart -->
        <svg class="heart-glass" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:rgba(255,255,255,0.75)"/>
              <stop offset="50%" style="stop-color:rgba(255,204,224,0.55)"/>
              <stop offset="100%" style="stop-color:rgba(255,133,162,0.4)"/>
            </linearGradient>
            <filter id="blur-soft">
              <feGaussianBlur stdDeviation="1.5"/>
            </filter>
          </defs>
          <!-- Main heart glass -->
          <path d="M150 240 C150 240 20 160 20 90 C20 50 50 20 90 20 C110 20 130 32 150 48 C170 32 190 20 210 20 C250 20 280 50 280 90 C280 160 150 240 150 240Z"
            fill="url(#heartGrad)" stroke="rgba(255,182,193,0.6)" stroke-width="2"/>
          <!-- Shine highlight -->
          <path d="M95 42 C88 35 78 32 72 38 C62 48 64 62 74 72" 
            stroke="rgba(255,255,255,0.9)" stroke-width="3" fill="none" stroke-linecap="round"/>
        </svg>
        <!-- Text overlay -->
        <div class="heart-content">
          <p class="about-text">
            💝<br>
            این وب‌اپلیکیشن<br>
            اختصاصی برای<br>
            <strong>سویتا خانوم</strong><br>
            طراحی و ساخته شده<br>
            از طرف پسرش<br>
            ❤️
          </p>
        </div>
      </div>
    </div>
  </section>

  <!-- FAB BUTTON -->
  <button id="fab" class="fab" onclick="toggleFab()" aria-label="افزودن محتوا">+</button>

  <!-- FAB MENU -->
  <div id="fabMenu" class="fab-menu" role="menu">
    <button class="fab-menu-item" onclick="fabAddPhoto()" role="menuitem">📷 افزودن عکس</button>
    <button class="fab-menu-item" onclick="fabAddDesc()" role="menuitem">✏️ افزودن توضیح</button>
    <button class="fab-menu-item" onclick="fabChooseGallery()" role="menuitem">🖼️ انتخاب از گالری</button>
  </div>
  <div id="fabOverlay" class="fab-overlay" onclick="closeFab()"></div>

  <!-- MODAL -->
  <div id="modalOverlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <h3 id="modalTitle" class="modal-title">عملیات</h3>
      <div id="modalContent"></div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="saveModal()">✅ ذخیره</button>
        <button class="btn-secondary" onclick="closeModal()">❌ لغو</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
